# KAWA·CHAIN — full stack with one command:
#
#     docker compose up --build
#
# Then open http://localhost:5173 and point MetaMask at
# http://127.0.0.1:8545 (chain id 31337).
#
# The chain container starts a fresh blockchain, deploys the contracts,
# and seeds demo participants + batches automatically on every start.

services:
  chain:
    build:
      context: .
      dockerfile: docker/chain.Dockerfile
    container_name: kawa-chain-node
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD-SHELL", "curl -s -X POST http://127.0.0.1:8545 -H 'Content-Type: application/json' --data '{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}' | grep -q result"]
      interval: 5s
      timeout: 3s
      retries: 20

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: kawa-chain-app
    ports:
      - "5173:5173"
    depends_on:
      chain:
        condition: service_healthy
